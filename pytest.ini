[pytest]
# Repo root on sys.path so `import src.xxx` resolves (src is an implicit
# namespace package - no top-level __init__.py).
pythonpath = .
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# importlib mode avoids sys.path/__init__ collisions between same-named test
# files in different stage folders.
addopts = -ra --import-mode=importlib

markers =
    integration: live tests that call the real OpenAI API (need OPENAI_API_KEY; slow, cost money). Run with: pytest -m integration
    slow: tests that take a long time to run

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
